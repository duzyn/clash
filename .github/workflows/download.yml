name: Download Subscriptions

on:
  schedule:
    # 每小时运行一次（UTC 时间）
    - cron: '0 * * * *'
  push:
    paths:
      # 当工作流文件本身有改动时自动运行
      - '.github/workflows/download.yml'
  workflow_dispatch:
    # 支持手动触发

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许推送代码

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set date variables
        run: |
          echo "TODAY=$(date +%Y%m%d)" >> $GITHUB_ENV
          echo "YEAR=$(date +%Y)" >> $GITHUB_ENV
          echo "MONTH=$(date +%m)" >> $GITHUB_ENV

      - name: Download from anaer/Sub (fixed URL)
        run: |
          mkdir -p sub
          echo "=== Downloading from anaer/Sub ==="
          for i in 1 2 3; do
            echo "Attempt $i..."
            HTTP_CODE=$(curl -sL --max-time 30 -o sub/latest.tmp -w "%{http_code}" "https://raw.githubusercontent.com/anaer/Sub/main/clash.yaml")
            SIZE=$(stat -c%s sub/latest.tmp 2>/dev/null || echo '0')
            echo "HTTP: $HTTP_CODE, Size: $SIZE bytes"
            if [ "$HTTP_CODE" = "200" ] && [ "$SIZE" -gt 100 ]; then
              mv sub/latest.tmp sub/latest.yml
              echo "Download successful"
              break
            fi
            sleep 2
          done
          if [ ! -f sub/latest.yml ]; then
            echo "All download attempts failed"
            rm -f sub/latest.tmp
          fi

      - name: Download from free-nodes/clashfree (date-specific)
        run: |
          mkdir -p free-nodes
          URL="https://raw.githubusercontent.com/free-nodes/clashfree/main/clash${TODAY}.yml"
          echo "=== Downloading from free-nodes ==="
          echo "URL: $URL"
          for i in 1 2 3; do
            echo "Attempt $i..."
            HTTP_CODE=$(curl -sL --max-time 30 -o free-nodes/latest.tmp -w "%{http_code}" "$URL")
            SIZE=$(stat -c%s free-nodes/latest.tmp 2>/dev/null || echo '0')
            echo "HTTP: $HTTP_CODE, Size: $SIZE bytes"
            if [ "$HTTP_CODE" = "200" ] && [ "$SIZE" -gt 100 ]; then
              mv free-nodes/latest.tmp free-nodes/latest.yml
              echo "Download successful"
              break
            fi
            sleep 2
          done
          if [ ! -f free-nodes/latest.yml ]; then
            echo "All download attempts failed"
            rm -f free-nodes/latest.tmp
          fi

      - name: Download from node.nodefree.me (date-specific)
        run: |
          mkdir -p nodefree
          URL="https://node.nodefree.me/${YEAR}/${MONTH}/${TODAY}.yaml"
          echo "=== Downloading from nodefree ==="
          echo "URL: $URL"
          for i in 1 2 3; do
            echo "Attempt $i..."
            HTTP_CODE=$(curl -sL --max-time 30 -o nodefree/latest.tmp -w "%{http_code}" "$URL")
            SIZE=$(stat -c%s nodefree/latest.tmp 2>/dev/null || echo '0')
            echo "HTTP: $HTTP_CODE, Size: $SIZE bytes"
            if [ "$HTTP_CODE" = "200" ] && [ "$SIZE" -gt 100 ]; then
              mv nodefree/latest.tmp nodefree/latest.yml
              echo "Download successful"
              break
            fi
            sleep 2
          done
          if [ ! -f nodefree/latest.yml ]; then
            echo "All download attempts failed"
            rm -f nodefree/latest.tmp
          fi

      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          echo "=== Summary ==="
          ls -la sub/latest.yml free-nodes/latest.yml nodefree/latest.yml 2>/dev/null || true
          git add sub/latest.yml free-nodes/latest.yml nodefree/latest.yml 2>/dev/null || true
          if ! git diff --quiet --staged; then
            git commit -m "Update subscriptions [skip ci]"
            git push
            echo "Changes committed and pushed"
          else
            echo "No changes to commit"
          fi