name: Download Subscriptions

on:
  schedule:
    # 每小时运行一次（UTC 时间）
    - cron: '0 * * * *'
  push:
    paths:
      # 当工作流文件本身有改动时自动运行
      - '.github/workflows/download.yml'
  workflow_dispatch:
    # 支持手动触发

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许推送代码

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set date variables
        run: |
          echo "TODAY=$(date +%Y%m%d)" >> $GITHUB_ENV
          echo "YEAR=$(date +%Y)" >> $GITHUB_ENV
          echo "MONTH=$(date +%m)" >> $GITHUB_ENV

      - name: Download from anaer/Sub (fixed URL)
        run: |
          mkdir -p sub
          echo "=== Downloading from anaer/Sub ==="
          HTTP_CODE=$(curl -sL -o sub/latest.tmp -w "%{http_code}" "https://raw.githubusercontent.com/anaer/Sub/main/clash.yaml" 2>&1)
          echo "Response/HTTP status: $HTTP_CODE"
          SIZE=$(stat -c%s sub/latest.tmp 2>/dev/null || echo '0')
          echo "File size: $SIZE bytes"
          if [ "$HTTP_CODE" = "200" ] && [ "$SIZE" -gt 0 ]; then
            mv sub/latest.tmp sub/latest.yml
            echo "Download successful"
          else
            echo "Download failed or file empty - attempting with verbose..."
            curl -vL "https://raw.githubusercontent.com/anaer/Sub/main/clash.yaml" 2>&1 | head -30
            rm -f sub/latest.tmp
          fi

      - name: Download from free-nodes/clashfree (date-specific)
        run: |
          mkdir -p free-nodes
          URL="https://raw.githubusercontent.com/free-nodes/clashfree/main/clash${TODAY}.yml"
          echo "=== Downloading from free-nodes ==="
          echo "URL: $URL"
          HTTP_CODE=$(curl -sL -o free-nodes/latest.tmp -w "%{http_code}" "$URL" 2>&1)
          echo "Response/HTTP status: $HTTP_CODE"
          SIZE=$(stat -c%s free-nodes/latest.tmp 2>/dev/null || echo '0')
          echo "File size: $SIZE bytes"
          if [ "$HTTP_CODE" = "200" ] && [ "$SIZE" -gt 0 ]; then
            mv free-nodes/latest.tmp free-nodes/latest.yml
            echo "Download successful"
          else
            echo "Download failed or file empty - attempting with verbose..."
            curl -vL "$URL" 2>&1 | head -30
            rm -f free-nodes/latest.tmp
          fi

      - name: Download from node.nodefree.me (date-specific)
        run: |
          mkdir -p nodefree
          URL="https://node.nodefree.me/${YEAR}/${MONTH}/${TODAY}.yaml"
          echo "=== Downloading from nodefree ==="
          echo "URL: $URL"
          HTTP_CODE=$(curl -s -o nodefree/latest.tmp -w "%{http_code}" "$URL")
          echo "HTTP status: $HTTP_CODE"
          echo "File size: $(stat -c%s nodefree/latest.tmp 2>/dev/null || echo '0') bytes"
          if [ "$HTTP_CODE" = "200" ] && [ -s nodefree/latest.tmp ]; then
            mv nodefree/latest.tmp nodefree/latest.yml
            echo "Download successful"
          else
            echo "Download failed or file empty"
            rm -f nodefree/latest.tmp
          fi

      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          echo "=== Files before commit ==="
          ls -la sub/latest.yml free-nodes/latest.yml nodefree/latest.yml 2>/dev/null || true
          echo "sub/latest.yml size: $(stat -c%s sub/latest.yml 2>/dev/null || echo 'N/A')"
          echo "free-nodes/latest.yml size: $(stat -c%s free-nodes/latest.yml 2>/dev/null || echo 'N/A')"
          echo "nodefree/latest.yml size: $(stat -c%s nodefree/latest.yml 2>/dev/null || echo 'N/A')"
          git add sub/latest.yml 2>/dev/null || true
          git add free-nodes/latest.yml 2>/dev/null || true
          git add nodefree/latest.yml 2>/dev/null || true
          if ! git diff --quiet --staged; then
            echo "Changes detected, committing..."
            git commit -m "Update subscriptions [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi